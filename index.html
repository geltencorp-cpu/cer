<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>안전교육 수료증 발급기</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts for authentic certificate look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- html2pdf.js for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f4f6;
        }
        .cert-font {
            font-family: 'Noto Serif KR', serif;
        }
        
        /* Certificate fixed A4 proportion */
        #certificate-wrapper {
            width: 100%;
            aspect-ratio: 210 / 297; /* Exact A4 aspect ratio (소수점 오차로 인한 2장 분할 완벽 방지) */
            background: white;
            position: relative;
            overflow: hidden; /* 페이지 분할(2장) 방지 1: 자식 요소 넘침 방지 */
        }
        
        /* 실제 이미지 직인용 스타일 */
        .seal-img {
            width: 80px;
            height: 80px;
            position: absolute;
            right: -30px; /* 텍스트 끝에 살짝 걸치도록 위치 */
            top: 50%;
            transform: translateY(-50%); /* 💡 기울기(rotate) 제거하여 반듯하게 수정 */
            /* 💡 종이에 잉크가 스며든 것처럼 보이게 하는 마법의 속성 */
            mix-blend-mode: multiply; 
            opacity: 0.9;
            object-fit: contain;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row">

    <!-- Left: Input Form -->
    <div class="w-full md:w-1/3 bg-white border-r border-gray-200 p-8 flex flex-col shadow-lg z-10 h-auto md:h-screen sticky top-0 overflow-y-auto">
        <div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">안전교육 수료증</h1>
            <p class="text-gray-500 mb-8">정보를 입력하고 수료증을 발급받으세요.</p>

            <div class="space-y-5">
                <!-- Course Name Input -->
                <div>
                    <label for="courseName" class="block text-sm font-medium text-gray-700 mb-1">과정명</label>
                    <input type="text" id="courseName" placeholder="예: 2026년 상반기 재난안전교육" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" onkeyup="updatePreview()">
                </div>

                <!-- Learner Name Input -->
                <div>
                    <div class="flex items-center gap-1 mb-1">
                        <label for="learnerName" class="block text-sm font-medium text-gray-700">학습자 이름</label>
                        <!-- Tooltip Group -->
                        <div class="relative flex items-center group cursor-help">
                            <!-- Question Mark Icon -->
                            <div class="text-gray-400 hover:text-blue-600 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                            </div>
                            <!-- Tooltip Content -->
                            <div class="pointer-events-none absolute left-1/2 bottom-full -translate-x-1/2 mb-2 w-max opacity-0 transition-opacity group-hover:opacity-100 z-50">
                                <div class="bg-gray-800 text-white text-[13px] rounded-lg py-2 px-3 shadow-xl break-keep text-center leading-relaxed">
                                    기관은 풀 네임을 넣어주세요.<br>
                                    <span class="text-gray-300">(ex: 안실련 x , 안전실천연합회 o)</span>
                                </div>
                                <!-- Tooltip Arrow -->
                                <div class="w-2 h-2 bg-gray-800 transform rotate-45 absolute -bottom-1 left-1/2 -translate-x-1/2"></div>
                            </div>
                        </div>
                    </div>
                    <input type="text" id="learnerName" placeholder="예: 홍길동" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" onkeyup="updatePreview()">
                </div>

                <!-- School/Affiliation Input -->
                <div>
                    <label for="schoolName" class="block text-sm font-medium text-gray-700 mb-1">학교명 (소속)</label>
                    <input type="text" id="schoolName" placeholder="예: 한국대학교" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" onkeyup="updatePreview()">
                </div>

                <!-- Issue Date Input -->
                <div>
                    <label for="issueDate" class="block text-sm font-medium text-gray-700 mb-1">발급 일자</label>
                    <input type="date" id="issueDate" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" onchange="updateDatePreview()">
                </div>

                <!-- Issue Organizations Checkboxes -->
                <div class="pt-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">발급 기관 선택</label>
                    <div class="flex flex-col gap-3 p-3 border border-gray-200 rounded-lg bg-gray-50">
                        <label class="inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="chkOrg1" class="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500" checked onchange="updatePreview()">
                            <span class="ml-3 text-gray-700 font-medium">사단법인 한국안전총연맹</span>
                        </label>
                        <label class="inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="chkOrg2" class="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500" checked onchange="updatePreview()">
                            <span class="ml-3 text-gray-700 font-medium">안전AI 안전택</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Issue Button -->
        <div class="mt-auto pt-8">
            <button onclick="generatePDF()" id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform hover:-translate-y-1 flex justify-center items-center gap-2 text-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                수료증 발급 (PDF)
            </button>
        </div>
    </div>

    <!-- Right: Certificate Preview -->
    <div class="w-full md:w-2/3 bg-gray-100 p-8 flex items-center justify-center overflow-y-auto relative">
        <!-- 💡 그림자(box-shadow)를 캡처 영역 밖으로 분리하여 PDF 2장 분할 버그 완벽 해결 -->
        <div class="w-full max-w-[794px] mx-auto shadow-2xl">
            <!-- Actual Certificate DOM to be captured -->
            <div id="certificate-wrapper" class="bg-white">
                
                <!-- Outer Navy Border -->
                <div class="absolute inset-5 border-[12px] border-[#1e3a8a] pointer-events-none"></div>
                <!-- Inner Gold Border -->
            <div class="absolute inset-[36px] border-[3px] border-[#bda55d] pointer-events-none"></div>
            <!-- Subtle Ivory Background -->
            <div class="absolute inset-[36px] bg-[#fffdf9] pointer-events-none"></div>

            <div id="certificate-content" class="absolute inset-[36px] p-10 flex flex-col justify-between z-10">
                
                <!-- Background Watermark -->
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-[0.06]">
                    <!-- 깃허브 Raw 이미지 링크 적용 (배경 워터마크 로고) -->
                    <img src="https://raw.githubusercontent.com/geltencorp-cpu/cer/a8a39a250483e408e9f0131adf189bdd14a924e0/background.png" crossorigin="anonymous" class="w-3/4 h-3/4 object-contain" alt="워터마크 로고">
                </div>

                <!-- Top Section -->
                <div class="text-center pt-2 relative z-20">
                    <p class="text-[#bda55d] text-lg mb-4 text-left cert-font font-bold tracking-widest" id="certNo">제 2026-0001 호</p>
                    <div class="inline-block relative">
                        <h1 class="text-4xl md:text-5xl font-black cert-font tracking-[2rem] text-[#1e3a8a] ml-[2rem] mt-2">수료증</h1>
                        <div class="h-[2px] w-full bg-[#bda55d] mt-6 opacity-80"></div>
                    </div>
                </div>

                <!-- Middle Section: User Details -->
                <div class="px-8 mt-12 space-y-8 relative z-20">
                    <!-- 소속 줄에 ID(schoolRow) 추가 및 기본으로 숨김 처리 -->
                    <div id="schoolRow" class="flex text-2xl cert-font items-end" style="display: none;">
                        <span class="w-36 font-bold text-[#1e3a8a] tracking-widest">소 속 :</span>
                        <span id="previewSchool" class="font-medium text-gray-900 border-b border-dotted border-gray-400 flex-1 ml-4 pb-2 px-2 text-center"></span>
                    </div>
                    <div class="flex text-2xl cert-font items-end">
                        <span id="previewNameLabel" class="w-36 font-bold text-[#1e3a8a] tracking-widest">성 명 :</span>
                        <span id="previewName" class="font-medium text-gray-900 border-b border-dotted border-gray-400 flex-1 ml-4 pb-2 px-2 text-center">이름을 입력하세요</span>
                    </div>
                    <div class="flex text-2xl cert-font items-end">
                        <span class="w-36 font-bold text-[#1e3a8a] tracking-widest">과 정 명 :</span>
                        <span id="previewCourse" class="font-medium text-gray-900 border-b border-dotted border-gray-400 flex-1 ml-4 pb-2 px-2 text-center">과정명을 입력하세요</span>
                    </div>
                </div>

                <!-- Statement Section -->
                <div class="px-4 text-center my-12 relative z-20">
                    <!-- 본문 기본 글자 크기 18px -> 22px 로 증가 -->
                    <p class="text-[22px] leading-[2.4] cert-font text-gray-800 break-keep">
                        <span id="previewSubject">위 사람은</span><br>
                        <!-- 강조되는 기관명 크기 20px -> 25px 로 증가 -->
                        <span id="previewHost"><strong class="text-[#1e3a8a] text-[25px]">사단법인 한국안전총연맹</strong>과 <strong class="text-[#1e3a8a] text-[25px]">안전AI 안전택</strong>이</span> 주관하는<br>
                        안전 교육 과정을 성실히 수료하였기에<br>
                        이 증서를 수여합니다.
                    </p>
                </div>

                <!-- Bottom Section: Date and Signees -->
                <div class="text-center pb-6 relative z-20">
                    <p id="previewDate" class="text-xl cert-font text-[#1e3a8a] mb-12 font-bold tracking-widest">2026년 03월 04일</p>
                    
                    <div class="flex items-center justify-center">
                        <!-- 첫번째 기관 및 직인 -->
                        <div id="org1Sign" class="relative inline-block pr-6">
                            <!-- 💡 whitespace-nowrap 추가(줄바꿈 방지) 및 tracking-wider 로 자간 살짝 축소 -->
                            <h2 class="text-2xl font-black cert-font text-gray-900 tracking-wider whitespace-nowrap">
                                사단법인 한국안전총연맹
                            </h2>
                            <!-- 깃허브 Raw 이미지 링크 적용 (한국안전총연맹) -->
                            <img src="https://raw.githubusercontent.com/geltencorp-cpu/cer/4879624c00015d401dd65ab83f97a35019088fd7/seal-ksf.png" crossorigin="anonymous" class="seal-img" alt="한국안전총연맹 직인">
                        </div>

                        <!-- 가운데 악수 이모티콘 제거 (대신 간격을 띄워주는 투명 여백 역할만 남김 - 여백 살짝 축소) -->
                        <span id="handshakeSign" class="mx-4 text-2xl"></span>

                        <!-- 두번째 기관 및 직인 -->
                        <div id="org2Sign" class="relative inline-block pr-6">
                            <!-- 💡 whitespace-nowrap 추가(줄바꿈 방지) 및 tracking-wider 로 자간 살짝 축소 -->
                            <h2 class="text-2xl font-black cert-font text-gray-900 tracking-wider whitespace-nowrap">
                                안전AI 안전택
                            </h2>
                            <!-- 💡 안전택 직인 이미지 내부의 투명 여백을 보정하기 위해 scale(1.18) 로 약 18% 확대 (기울기 제거) -->
                            <img src="https://raw.githubusercontent.com/geltencorp-cpu/cer/4879624c00015d401dd65ab83f97a35019088fd7/seal-anjeon.png" crossorigin="anonymous" class="seal-img" alt="안전AI 안전택 직인" style="transform: translateY(-50%) scale(1.18);">
                        </div>
                    </div>
                </div>

            </div>
        </div>
        </div>
    </div>

    <script>
        // 🚨 새로 발급받은 구글 앱스 스크립트 URL 적용 완료!
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxmXcHYgfe6MUtBXolGJrRctycaxkNqfrNrOZz7pzuuEoXTm04K1We4T99NGRUUDbtr/exec';

        // Set today's date on load
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            
            // Set date input default value
            const todayStr = `${year}-${month}-${day}`;
            document.getElementById('issueDate').value = todayStr;
            updateDatePreview();
            
            // 💡 발급 번호는 시트에서 받아오므로 화면 로딩 시에는 대기 상태로 표시
            document.getElementById('certNo').innerText = `제 ${year}-#### 호`;
            
            // 초기 로딩 시 입력값에 맞춰 미리보기 업데이트 (소속 줄 숨김 처리 등)
            updatePreview();
        });

        // Real-time preview update for Text
        function updatePreview() {
            const courseName = document.getElementById('courseName').value;
            const learnerName = document.getElementById('learnerName').value;
            const schoolName = document.getElementById('schoolName').value.trim();

            document.getElementById('previewCourse').innerText = courseName || '과정명을 입력하세요';
            document.getElementById('previewName').innerText = learnerName || '이름을 입력하세요';
            
            // --- 0. 학교명(소속) 숨김/표시 처리 ---
            const schoolRow = document.getElementById('schoolRow');
            if (schoolName === '') {
                schoolRow.style.display = 'none';
            } else {
                schoolRow.style.display = 'flex';
                document.getElementById('previewSchool').innerText = schoolName;
            }

            // --- 1. 사람 vs 기관 판단 로직 ---
            const orgKeywords = ['협회', '사단법인', '법인', '학교', '재단', '연맹', '시청', '구청', '공사', '연대', '협의회', '의회'];
            const isOrgName = orgKeywords.some(keyword => learnerName.includes(keyword));
            const previewNameLabel = document.getElementById('previewNameLabel');
            
            if (learnerName.trim() === '') {
                document.getElementById('previewSubject').innerText = '위 사람은'; // 기본값
                previewNameLabel.innerText = '성 명 :';
            } else if (isOrgName) {
                document.getElementById('previewSubject').innerText = '위 기관은';
                previewNameLabel.innerText = '기 관 명 :';
            } else {
                document.getElementById('previewSubject').innerText = '위 사람은';
                previewNameLabel.innerText = '성 명 :';
            }

            // --- 2. 발급 기관 선택 로직 ---
            const isOrg1 = document.getElementById('chkOrg1').checked;
            const isOrg2 = document.getElementById('chkOrg2').checked;
            const previewHost = document.getElementById('previewHost');
            
            if (isOrg1 && isOrg2) {
                previewHost.innerHTML = `<strong class="text-[#1e3a8a] text-[25px]">사단법인 한국안전총연맹</strong>과 <strong class="text-[#1e3a8a] text-[25px]">안전AI 안전택</strong>이`;
            } else if (isOrg1) {
                previewHost.innerHTML = `<strong class="text-[#1e3a8a] text-[25px]">사단법인 한국안전총연맹</strong>이`;
            } else if (isOrg2) {
                previewHost.innerHTML = `<strong class="text-[#1e3a8a] text-[25px]">안전AI 안전택</strong>이`;
            } else {
                previewHost.innerHTML = ``; // 아무것도 선택 안했을 때
            }

            document.getElementById('org1Sign').style.display = isOrg1 ? 'inline-block' : 'none';
            document.getElementById('org2Sign').style.display = isOrg2 ? 'inline-block' : 'none';
            document.getElementById('handshakeSign').style.display = (isOrg1 && isOrg2) ? 'inline-block' : 'none';
        }

        // Real-time preview update for Date
        function updateDatePreview() {
            const dateVal = document.getElementById('issueDate').value;
            if(dateVal) {
                const [year, month, day] = dateVal.split('-');
                document.getElementById('previewDate').innerText = `${year}년 ${month}월 ${day}일`;
            }
        }

        // PDF Generation Logic using html2pdf.js
        function generatePDF() {
            const isOrg1 = document.getElementById('chkOrg1').checked;
            const isOrg2 = document.getElementById('chkOrg2').checked;
            if(!isOrg1 && !isOrg2) {
                alert("발급 기관을 최소 1개 이상 선택해주세요.");
                return;
            }

            const learnerName = document.getElementById('learnerName').value;
            if(!learnerName) {
                alert("학습자 이름을 입력해주세요.");
                document.getElementById('learnerName').focus();
                return;
            }

            const btn = document.getElementById('generateBtn');
            const originalText = btn.innerHTML;
            
            // Show loading state
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 발급 및 저장 중...`;
            btn.disabled = true;

            const courseName = document.getElementById('courseName').value;
            const schoolName = document.getElementById('schoolName').value;
            const issueDate = document.getElementById('issueDate').value;
            
            const element = document.getElementById('certificate-wrapper');
            const filename = `${learnerName}_안전교육_수료증.pdf`;

            // 실제 PDF를 굽는 공통 함수
            const executePDFGeneration = () => {
                const opt = {
                    margin:       0,
                    filename:     filename,
                    image:        { type: 'jpeg', quality: 1 },
                    html2canvas:  { scale: 2, useCORS: true, letterRendering: true, scrollY: 0 },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };

                html2pdf().set(opt).from(element).toPdf().get('pdf').then((pdf) => {
                    const totalPages = pdf.internal.getNumberOfPages();
                    for (let i = totalPages; i > 1; i--) {
                        pdf.deletePage(i);
                    }
                }).save().then(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }).catch(err => {
                    console.error("PDF 생성 오류:", err);
                    alert("PDF 생성 중 오류가 발생했습니다.");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                });
            };

            // 1. 구글 스프레드시트로 데이터 전송 및 발급 번호 받아오기
            if (GOOGLE_SCRIPT_URL !== 'YOUR_GOOGLE_SCRIPT_WEB_APP_URL') {
                // CORS 문제 없이 폼 데이터 전송하기 위해 URLSearchParams 사용
                const params = new URLSearchParams();
                params.append('courseName', courseName);
                params.append('learnerName', learnerName);
                params.append('schoolName', schoolName);
                params.append('issueDate', issueDate);

                // 서버 응답을 받아야 하므로 mode: 'no-cors' 제거
                fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: params
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        // 서버에서 부여해준 새 번호를 수료증에 즉시 반영
                        document.getElementById('certNo').innerText = `제 ${data.certNo} 호`;
                    }
                    // 번호가 찍힌 후 PDF 굽기 시작
                    executePDFGeneration();
                })
                .catch(err => {
                    console.error("시트 저장 및 번호 발급 실패:", err);
                    alert("구글 시트와 통신 중 문제가 발생했습니다. (네트워크 상태나 구글 스크립트 설정을 확인해주세요.)");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                });
            } else {
                console.log("구글 스크립트 URL이 설정되지 않아 임시 번호로 발급합니다.");
                document.getElementById('certNo').innerText = `제 2026-9999 호`;
                executePDFGeneration();
            }
        }
    </script>
</body>
</html>
